font_family JetBrainsMono Nerd Font
font_size 12
bold_font auto
bold_italic_font auto
italic_font auto
bold_italic_font auto

# Aesthetics
cursor_shape block
disable_ligatures never
enable_auto_bell no

window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0
resize_in_steps yes

shell bash
shell_integration no-cursor
